<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo - Gerenciar Usuários</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --bg:#eef7f1;
            --card:#ffffff;
            --primary:#1b8f5a;
            --primary-dark:#146c43;
            --blue:#2d7ff9;
            --text:#173524;
            --text-light:#5c7265;
            --border:#d7e8de;
            --shadow:rgba(16,88,52,0.08);

            --sidebar:
            linear-gradient(180deg,#0d3b2e 0%,#145c46 100%);
        }

        [data-theme="dark"]{
            --bg:#081c15;
            --card:#102820;
            --primary:#26b36f;
            --primary-dark:#1b8f5a;
            --blue:#5ea2ff;
            --text:#ecfff4;
            --text-light:#9fc3b0;
            --border:#1f4d3d;
            --shadow:rgba(0,0,0,0.3);

            --sidebar:
            linear-gradient(180deg,#04110d 0%,#0b241c 100%);
        }

        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background:var(--bg);
            color:var(--text);
        }

        .container{
            display:flex;
            min-height:100vh;
        }

        .sidebar{
            width:280px;
            background:var(--sidebar);
            padding:2rem 1.5rem;
            position:fixed;
            height:100vh;
            color:white;
            display:flex;
            flex-direction:column;
        }

        .admin-header{
            text-align:center;
            border-bottom:1px solid rgba(255,255,255,0.1);
            padding-bottom:1.5rem;
            margin-bottom:2rem;
        }

        .admin-badge{
            background:#ffffff20;
            padding:8px 18px;
            border-radius:30px;
            font-size:0.75rem;
            font-weight:700;
            letter-spacing:1px;
            display:inline-block;
            margin-bottom:1rem;
        }

        .logo{
            font-size:2rem;
            font-weight:800;
            letter-spacing:1px;
        }

        .user-name{
            margin-top:8px;
            color:#c6e6d3;
            font-size:0.9rem;
        }

        .nav-menu{
            list-style:none;
            margin-top:2rem;
            flex:0.5;
        }

        .nav-item{
            margin-bottom:0.7rem;
        }

        .nav-link{
            display:flex;
            align-items:center;
            padding:14px 18px;
            border-radius:14px;
            text-decoration:none;
            color:#d8f3e3;
            transition:0.3s;
            font-weight:500;
        }

        .active{
            background:#dff5e8;
            color:#146c43;
        }

        .nav-link:hover,
        .nav-link.active{
            background:rgba(255,255,255,0.12);
        }

        .bottom-links{
            border-top:1px solid rgba(255,255,255,0.1);
            padding-top:1rem;
        }

        .theme-toggle{
            width:100%;
            border:none;
            background:none;
            color:#d8f3e3;
            text-align:left;
            padding:14px 18px;
            border-radius:14px;
            cursor:pointer;
            transition:0.3s;
            margin-bottom:0.5rem;
            font-size:0.95rem;
        }

        .theme-toggle:hover{
            background:rgba(255,255,255,0.12);
        }

        .main-content{
            margin-left:280px;
            flex:1;
            padding:2rem;
        }

        .top-bar{
            background:var(--card);
            border-radius:20px;
            padding:2rem;
            box-shadow:0 5px 25px var(--shadow);
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:2rem;
            border-left:6px solid var(--primary);
        }

        .top-bar h1{
            font-size:2rem;
            margin-bottom:6px;
        }

        .top-bar p{
            color:var(--text-light);
        }

        .admin-label{
            background:#dff5e8;
            color:#146c43;
            padding:10px 20px;
            border-radius:30px;
            font-weight:700;
        }

        .card{
            background:var(--card);
            border-radius:20px;
            padding:2rem;
            box-shadow:0 5px 25px var(--shadow);
            margin-bottom:2rem;
        }

        .card h2{
            margin-bottom:1.5rem;
            font-size:1.4rem;
        }

        .message{
            padding:1rem;
            border-radius:12px;
            margin-bottom:1.5rem;
            display:none;
            font-weight:600;
        }

        .message-success{
            background:#dff5e8;
            color:#146c43;
        }

        .message-error{
            background:#ffe2e2;
            color:#b42323;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:1.5rem;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
        }

        .form-group input,
        .form-group select{
            width:100%;
            padding:14px;
            border:2px solid var(--border);
            border-radius:12px;
            background:#f7fbf8;
            font-size:1rem;
            color:var(--text);
            outline:none;
            transition:0.3s;
        }

        .form-group input:focus,
        .form-group select:focus{
            border-color:var(--primary);
            box-shadow:0 0 0 4px rgba(27,143,90,0.1);
        }

        .btn-create{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:
            linear-gradient(135deg,#001e10,#0c2516);
            color:white;
            font-size:1rem;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-create:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(27,143,90,0.25);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#02390f;
            color:var(--text-light);
            font-size:0.85rem;
        }

        th,td{
            padding:15px;
            text-align:left;
            border-bottom:1px solid var(--border);
        }

        tbody tr:hover{
            background: rgba(2, 27, 6, 0.292);
        }

        .role-badge{
            padding:7px 14px;
            border-radius:20px;
            font-size:0.8rem;
            font-weight:700;
            display:inline-block;
        }

        .role-admin{
            background:#ffe2e2;
            color:#b42323;
        }

        .role-user{
            background:#dcebff;
            color:#2257a7;
        }

        .btn-edit-role{
            border:none;
            background:#eef4ff;
            color:#2257a7;
            padding:7px 12px;
            border-radius:10px;
            cursor:pointer;
            margin-left:6px;
            transition:0.3s;
        }

        .btn-edit-role:hover{
            opacity:0.8;
        }

        .permanent-badge{
            background:#fff3d6;
            color:#9c6500;
            padding:4px 10px;
            border-radius:12px;
            font-size:0.7rem;
            margin-left:8px;
            font-weight:700;
        }

        .modal-overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.5);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:1000;
        }

        .modal-overlay.active{
            display:flex;
        }

        .modal{
            background:var(--card);
            padding:2rem;
            border-radius:20px;
            width:90%;
            max-width:450px;
            text-align:center;
        }

        .modal h3{
            margin-bottom:1rem;
        }

        .modal p{
            color:var(--text-light);
            margin-bottom:1.5rem;
        }

        .modal-buttons{
            display:flex;
            gap:1rem;
            justify-content:center;
        }

        .btn-confirm,
        .btn-cancel{
            border:none;
            padding:12px 22px;
            border-radius:12px;
            cursor:pointer;
            font-weight:700;
        }

        .btn-confirm{
            background:
            linear-gradient(135deg,#1b8f5a,#2d7ff9);
            color:white;
        }

        .btn-cancel{
            background:#e7ece9;
            color:var(--text);
        }

        @media(max-width:900px){
            .sidebar{
                width:220px;
            }
            .main-content{
                margin-left:220px;
            }
            .form-grid{
                grid-template-columns:1fr;
            }
        }

        @media(max-width:768px){
            .sidebar{
                display:none;
            }
            .main-content{
                margin-left:0;
                padding:1rem;
            }
            .top-bar{
                flex-direction:column;
                align-items:flex-start;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <nav class="sidebar">
        <div class="admin-header">
            <span class="admin-badge">ADMINISTRADOR</span>
            <div class="logo">Echo</div>
            <div class="user-name" id="sidebarUserName"></div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="admin_criar_usuario.html" class="nav-link active">Gerenciar Usuários</a>
            </li>
        </ul>

        <div class="bottom-links">
            <button class="theme-toggle" onclick="toggleTheme()">Alternar Tema</button>
            <a href="index.html" class="nav-link">Página Inicial</a>
            <a href="#" class="nav-link" onclick="logout()">Sair</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <div>
                <h1>Gerenciar Usuários</h1>
                <p>Criar, editar e visualizar usuários do sistema</p>
            </div>
            <span class="admin-label">ADMIN</span>
        </div>

        <div class="card">
            <h2>Criar Novo Usuário</h2>
            <div class="message" id="message"></div>

            <form id="createUserForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="password" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" id="phone">
                    </div>
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="role">
                            <option value="user">Usuário</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <div class="form-group" style="display:flex;align-items:end;">
                        <button type="submit" class="btn-create" id="submitBtn">Criar Usuário</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>Usuários Cadastrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Tipo</th>
                        <th>Telefone</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="modal">
        <h3 id="modalTitle">Confirmar Alteração</h3>
        <p id="modalMessage"></p>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-confirm" onclick="confirmAction()">Confirmar</button>
        </div>
    </div>
</div>

<script>

    function checkAuth(){
        const user = JSON.parse(sessionStorage.getItem('agroecho_user'));
        
        if(!user){
            alert('Faça login novamente');
            window.location.href='index.html';
            return null;
        }

        if(user.role !== 'admin'){
            alert('Acesso negado');
            window.location.href='user_dispositivos.html';
            return null;
        }

        return user;
    }

    const user = checkAuth();
    if (!user) throw new Error('Auth failed');
    
    document.getElementById('sidebarUserName').textContent = user.name;


    let theme = localStorage.getItem('agroecho_theme') || 'light';

    function applyTheme(){
        if(theme === 'dark'){
            document.documentElement.setAttribute('data-theme','dark');
        } else {
            document.documentElement.removeAttribute('data-theme');
        }
    }

    function toggleTheme(){
        theme = theme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('agroecho_theme', theme);
        applyTheme();
    }

    applyTheme();


    function loadUsers(){
        let users = JSON.parse(localStorage.getItem('agroecho_all_users'));

        if(!users || users.length === 0){
            users = [
                {
                    id: 1,
                    name: 'Administrador',
                    email: 'admin@agroecho.com.br',
                    password: 'admin123',
                    role: 'admin',
                    phone: '(11) 99999-9999',
                    createdAt: '2024-01-15',
                    permanent: true
                },
                {
                    id: 2,
                    name: 'João Silva',
                    email: 'joao@email.com',
                    password: 'joao123',
                    role: 'user',
                    phone: '(11) 98888-8888',
                    createdAt: '2024-02-20',
                    permanent: false
                }
            ];
            saveUsers(users);
        }

        return users;
    }

    function saveUsers(users){
        localStorage.setItem('agroecho_all_users', JSON.stringify(users));
    }

    let users = loadUsers();

    function renderUsers(){
        const tbody = document.getElementById('usersTable');
        
        tbody.innerHTML = users.map(function(u) {
            var roleLabel = u.role === 'admin' ? 'Administrador' : 'Usuário';
            var roleClass = u.role === 'admin' ? 'role-admin' : 'role-user';
            var permBadge = u.permanent ? '<span class="permanent-badge">Fixo</span>' : '';

            var roleBadge = '';
            if (u.permanent) {
                roleBadge = '<span class="role-badge ' + roleClass + '">' + roleLabel + '</span>';
            } else {
                roleBadge = '<span class="role-badge ' + roleClass + '" style="cursor:pointer;" onclick="showRoleMenu(event, ' + u.id + ')" title="Clique para alterar o tipo">' + roleLabel + ' ▾</span>';
            }

            var deleteBtn = '';
            if (!u.permanent) {
                deleteBtn = '<button class="btn-edit-role" onclick="deleteUser(' + u.id + ')" style="background:#ffe2e2;color:#b42323;">Excluir</button>';
            }
            
            return '<tr>' +
                '<td><strong>#' + u.id + '</strong></td>' +
                '<td>' + u.name + permBadge + '</td>' +
                '<td>' + u.email + '</td>' +
                '<td>' + roleBadge + '</td>' +
                '<td>' + (u.phone || '-') + '</td>' +
                '<td>' + u.createdAt + '</td>' +
                '<td>' + (u.permanent ? '<span style="color:#999;">Protegido</span>' : deleteBtn) + '</td>' +
                '</tr>';
        }).join('');
    }


    function showRoleMenu(event, userId) {
        event.stopPropagation();
        
        var targetUser = users.find(function(u) { return u.id === userId; });
        if (!targetUser || targetUser.permanent) return;
        

        var existingMenu = document.getElementById('roleMenu');
        if (existingMenu) {
            existingMenu.remove();
        }
        

        var menu = document.createElement('div');
        menu.id = 'roleMenu';
        menu.style.cssText = `
            position: fixed;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 8px;
            z-index: 2000;
            min-width: 180px;
        `;
        
        menu.style.left = event.clientX + 'px';
        menu.style.top = event.clientY + 'px';
        
        var userOption = document.createElement('div');
        userOption.style.cssText = `
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            font-weight: 500;
            color: #173524;
        `;
        userOption.innerHTML = '👤 <span>Usuário Comum</span>';
        
        if (targetUser.role === 'user') {
            userOption.style.background = '#dcebff';
            userOption.style.color = '#2257a7';
            userOption.innerHTML = ' <span>Usuário Comum</span> ✓';
        }
        
        userOption.addEventListener('mouseenter', function() {
            if (targetUser.role !== 'user') {
                this.style.background = '#f0f4ff';
            }
        });
        userOption.addEventListener('mouseleave', function() {
            if (targetUser.role !== 'user') {
                this.style.background = 'transparent';
            }
        });
        userOption.addEventListener('click', function() {
            changeUserRole(userId, 'user');
            menu.remove();
        });

        var adminOption = document.createElement('div');
        adminOption.style.cssText = `
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            font-weight: 500;
            color: #173524;
        `;
        adminOption.innerHTML = ' <span>Administrador</span>';
    
        if (targetUser.role === 'admin') {
            adminOption.style.background = '#ffe2e2';
            adminOption.style.color = '#b42323';
            adminOption.innerHTML = ' <span>Administrador</span> ✓';
        }
        
        adminOption.addEventListener('mouseenter', function() {
            if (targetUser.role !== 'admin') {
                this.style.background = '#fff5f5';
            }
        });
        adminOption.addEventListener('mouseleave', function() {
            if (targetUser.role !== 'admin') {
                this.style.background = 'transparent';
            }
        });
        adminOption.addEventListener('click', function() {
            changeUserRole(userId, 'admin');
            menu.remove();
        });
        
        // Separador
        var separator = document.createElement('div');
        separator.style.cssText = `
            height: 1px;
            background: #e1e5e9;
            margin: 4px 8px;
        `;
        
        // Cancelar
        var cancelOption = document.createElement('div');
        cancelOption.style.cssText = `
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            transition: background 0.2s;
        `;
        cancelOption.textContent = 'Cancelar';
        cancelOption.addEventListener('mouseenter', function() {
            this.style.background = '#f5f5f5';
        });
        cancelOption.addEventListener('mouseleave', function() {
            this.style.background = 'transparent';
        });
        cancelOption.addEventListener('click', function() {
            menu.remove();
        });
        

        menu.appendChild(userOption);
        menu.appendChild(adminOption);
        menu.appendChild(separator);
        menu.appendChild(cancelOption);
        
        document.body.appendChild(menu);

        setTimeout(function() {
            document.addEventListener('click', function closeMenu() {
                if (document.getElementById('roleMenu')) {
                    document.getElementById('roleMenu').remove();
                }
                document.removeEventListener('click', closeMenu);
            });
        }, 100);
    }


    function changeUserRole(userId, newRole) {
        var targetUser = users.find(function(u) { return u.id === userId; });
        if (!targetUser || targetUser.permanent) return;
        

        if (targetUser.role === newRole) return;
        
        var roleName = newRole === 'admin' ? 'Administrador' : 'Usuário Comum';
        
        targetUser.role = newRole;
        saveUsers(users);
        renderUsers();
        showMessage('success', '"' + targetUser.name + '" agora é ' + roleName + '!');
    }


    var pendingAction = null;

    function deleteUser(userId){
        var targetUser = users.find(function(u) { return u.id === userId; });
        if (!targetUser || targetUser.permanent) return;
        
        document.getElementById('modalTitle').textContent = 'Excluir Usuário';
        document.getElementById('modalMessage').textContent = 'Tem certeza que deseja excluir "' + targetUser.name + '"? Esta ação não pode ser desfeita.';
        document.getElementById('confirmModal').classList.add('active');
        
        pendingAction = function() {
            users = users.filter(function(u) { return u.id !== userId; });
            saveUsers(users);
            renderUsers();
            showMessage('success', 'Usuário "' + targetUser.name + '" removido!');
            closeModal();
        };
    }

    function confirmAction(){
        if(pendingAction){
            pendingAction();
            pendingAction = null;
        }
    }

    function closeModal(){
        document.getElementById('confirmModal').classList.remove('active');
        pendingAction = null;
    }


    document.getElementById('confirmModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    function showMessage(type, text){
        var msg = document.getElementById('message');
        msg.className = 'message message-' + type;
        msg.textContent = text;
        msg.style.display = 'block';
        
        setTimeout(function() {
            msg.style.display = 'none';
        }, 4000);
    }


    document.getElementById('createUserForm').addEventListener('submit', async function(e){
        e.preventDefault();

        var btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Criando...';

        var newUser = {
            id: users.length > 0 ? Math.max.apply(null, users.map(function(u) { return u.id; })) + 1 : 1,
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            phone: document.getElementById('phone').value.trim(),
            role: document.getElementById('role').value,
            createdAt: new Date().toISOString().split('T')[0],
            permanent: false
        };

        await new Promise(function(r) { return setTimeout(r, 700); });

        if(users.some(function(u) { return u.email === newUser.email; })){
            showMessage('error', 'Este email já existe');
            btn.disabled = false;
            btn.textContent = 'Criar Usuário';
            return;
        }

        users.push(newUser);
        saveUsers(users);
        renderUsers();

        showMessage('success', 'Usuário "' + newUser.name + '" criado com sucesso!');

        document.getElementById('createUserForm').reset();
        btn.disabled = false;
        btn.textContent = 'Criar Usuário';
    });


    function logout(){
        sessionStorage.removeItem('agroecho_user');
        window.location.href = 'index.html';
    }

    renderUsers();
</script>

</body>
</html>
