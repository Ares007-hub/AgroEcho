<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroEcho - Dashboard Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* TEMA CLARO */
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #666;
            --text-light: #999;
            --border: #e1e5e9;
            --shadow: rgba(0,0,0,0.05);
            --thead-bg: #f8f9fa;
            --hover-row: #f8f9fa;
        }
        
        /* TEMA ESCURO */
        [data-theme="dark"] {
            --bg: #0f0c29;
            --card-bg: #16213e;
            --text: #e1e5e9;
            --text-secondary: #a0a0b0;
            --text-light: #888;
            --border: #2a2a4a;
            --shadow: rgba(0,0,0,0.3);
            --thead-bg: #1a1a2e;
            --hover-row: #1a1a3e;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
        }

        .container { display: flex; min-height: 100vh; }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .admin-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .sidebar .logo { 
            font-size: 2rem; 
            font-weight: bold; 
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar .user-name { color: #999; font-size: 0.9rem; }

        .nav-menu { list-style: none; margin-top: 2rem; flex: 1; }
        .nav-item { margin-bottom: 0.5rem; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(102, 126, 234, 0.2);
            color: white;
        }

        .nav-link .icon { font-size: 1.3rem; }

        .bottom-links {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1rem;
        }

        /* BOTÃO TEMA */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: rgba(255,255,255,0.7);
            border-radius: 12px;
            transition: all 0.3s;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .theme-toggle:hover {
            background: rgba(102, 126, 234, 0.2);
            color: white;
        }

        .theme-icon {
            font-size: 1.3rem;
            transition: transform 0.5s;
        }

        .theme-toggle:hover .theme-icon {
            transform: rotate(30deg);
        }

        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 2rem;
        }

        .top-bar {
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 2px 10px var(--shadow);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .top-bar h1 { font-size: 1.8rem; color: var(--text); }
        .top-bar p { color: var(--text-secondary); margin-top: 5px; }
        
        .top-bar .admin-label {
            background: #1a1a2e;
            color: #f59e0b;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 2px 10px var(--shadow);
            border-top: 4px solid #667eea;
        }

        .stat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--text); }
        .stat-label { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.3rem; }

        .chart-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 2px 10px var(--shadow);
            margin-bottom: 2rem;
        }

        .chart-card h3 { margin-bottom: 1rem; color: var(--text); }

        .table-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 2px 10px var(--shadow);
            overflow-x: auto;
        }

        .table-card h3 { margin-bottom: 1rem; color: var(--text); }

        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--thead-bg); }
        th, td { 
            padding: 14px; 
            text-align: left; 
            border-bottom: 1px solid var(--border); 
            color: var(--text);
        }
        th { 
            font-weight: 600; 
            color: var(--text-secondary); 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        
        tbody tr {
            transition: background 0.2s;
        }
        
        tbody tr:hover {
            background: var(--hover-row);
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-active { background: #d1fae5; color: #065f46; }
        .badge-inactive { background: #fee2e2; color: #991b1b; }
        .badge-maintenance { background: #fef3c7; color: #92400e; }

        .battery-bar {
            width: 80px;
            height: 8px;
            background: #4a4a6a;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        .battery-fill { height: 100%; border-radius: 4px; }
        .battery-high { background: #10b981; }
        .battery-medium { background: #f59e0b; }
        .battery-low { background: #ef4444; }

        small { color: var(--text-light); }

        /* Ajuste do gráfico para tema escuro */
        canvas {
            max-height: 300px;
        }

        @media (max-width: 1200px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .sidebar { width: 200px; padding: 1.5rem 1rem; }
            .main-content { margin-left: 200px; padding: 1rem; }
            .stats-row { grid-template-columns: 1fr; }
            .top-bar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="admin-header">
                <span class="admin-badge">👑 ADMINISTRADOR</span>
                <div class="logo">AgroEcho</div>
                <div class="user-name" id="sidebarUserName"></div>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link active">
                        <span class="icon"></span> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="admin_criar_usuario.html" class="nav-link">
                        <span class="icon"></span> Gerenciar Usuários
                    </a>
                </li>
            </ul>

            <div class="bottom-links">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                    <span id="themeText">Modo Escuro</span>
                </button>
                <a href="index.html" class="nav-link">
                    <span class="icon"></span> Página Inicial
                </a>
                <a href="#" class="nav-link" onclick="logout()">
                    <span class="icon"></span> Sair
                </a>
            </div>
        </nav>

        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h1> Dashboard do Administrador</h1>
                    <p>Visão geral de todos os dispositivos do sistema</p>
                </div>
                <span class="admin-label">ACESSO TOTAL</span>
            </div>

            <div class="stats-row" id="statsRow"></div>

            <div class="chart-card">
                <h3>📈 Status dos Dispositivos</h3>
                <canvas id="statusChart" height="80"></canvas>
            </div>

            <div class="table-card">
                <h3>📡 Todos os Dispositivos Conectados</h3>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th>Proprietário</th>
                            <th>Status</th>
                            <th>Bateria</th>
                            <th>Sinal</th>
                            <th>Última Leitura</th>
                        </tr>
                    </thead>
                    <tbody id="devicesTable"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // ============================================
        // VERIFICAÇÃO DE AUTENTICAÇÃO (CORRIGIDA)
        // ============================================
        const user = JSON.parse(sessionStorage.getItem('agroecho_user'));
        
        if (!user) {
            alert('Sessão expirada! Faça login novamente.');
            window.location.href = 'index.html';
        }
        
        if (user.role !== 'admin') {
            alert('Acesso negado! Apenas administradores.');
            window.location.href = 'user_dispositivos.html';
        }

        document.getElementById('sidebarUserName').textContent = user.name;

        // ============================================
        // TEMA ESCURO/CLARO (SINCRONIZADO)
        // ============================================
        let theme = localStorage.getItem('agroecho_theme') || 'light';
        
        function applyTheme() {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').textContent = '☀️';
                document.getElementById('themeText').textContent = 'Modo Claro';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.getElementById('themeIcon').textContent = '🌙';
                document.getElementById('themeText').textContent = 'Modo Escuro';
            }
        }
        
        function toggleTheme() {
            theme = theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('agroecho_theme', theme);
            applyTheme();
        }
        
        applyTheme();

        // ============================================
        // DADOS DOS DISPOSITIVOS
        // ============================================
        const allDevices = [
            { id: 'ESP32-SOIL-001', name: 'Sensor Umidade Solo', type: 'Sensor Capacitivo v1.2', owner: 'João Silva', status: 'active', battery: 87, signal: -85, lastReading: '869 kPa', lastUpdate: '2 min atrás' },
            { id: 'ESP32-RAIN-002', name: 'Pluviômetro Central', type: 'Pluviômetro de Báscula', owner: 'João Silva', status: 'active', battery: 92, signal: -78, lastReading: '2.5 mm', lastUpdate: '5 min atrás' },
            { id: 'ESP32-FLOW-003', name: 'Sensor de Fluxo', type: 'YF-S201', owner: 'João Silva', status: 'active', battery: 95, signal: -72, lastReading: '12.3 L/min', lastUpdate: '1 min atrás' },
            { id: 'ESP32-TEMP-004', name: 'Sensor Temperatura', type: 'DS18B20', owner: 'Maria Santos', status: 'inactive', battery: 12, signal: -95, lastReading: '28.5 °C', lastUpdate: '3 horas atrás' },
            { id: 'ESP32-LUX-005', name: 'Sensor Radiação Solar', type: 'BH1750', owner: 'Maria Santos', status: 'active', battery: 88, signal: -76, lastReading: '624 lux', lastUpdate: '10 min atrás' },
            { id: 'ESP32-SOIL-006', name: 'Sensor Umidade Horta', type: 'Sensor Capacitivo v1.2', owner: 'Maria Santos', status: 'maintenance', battery: 45, signal: -82, lastReading: '750 kPa', lastUpdate: '30 min atrás' }
        ];

        function renderStats() {
            const active = allDevices.filter(d => d.status === 'active').length;
            const avgBattery = Math.round(allDevices.reduce((acc, d) => acc + d.battery, 0) / allDevices.length);
            const avgSignal = Math.round(Math.abs(allDevices.reduce((acc, d) => acc + d.signal, 0) / allDevices.length));

            document.getElementById('statsRow').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">📡</div>
                    <div class="stat-value">${allDevices.length}</div>
                    <div class="stat-label">Total de Dispositivos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value">${active}</div>
                    <div class="stat-label">Dispositivos Ativos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔋</div>
                    <div class="stat-value">${avgBattery}%</div>
                    <div class="stat-label">Bateria Média</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📶</div>
                    <div class="stat-value">${avgSignal} dBm</div>
                    <div class="stat-label">Sinal Médio</div>
                </div>
            `;
        }

        function renderTable() {
            document.getElementById('devicesTable').innerHTML = allDevices.map(device => `
                <tr>
                    <td><strong>${device.id}</strong></td>
                    <td>${device.name}</td>
                    <td>${device.type}</td>
                    <td>${device.owner}</td>
                    <td><span class="badge badge-${device.status}">${device.status === 'active' ? 'Ativo' : device.status === 'inactive' ? 'Inativo' : 'Manutenção'}</span></td>
                    <td>
                        <span class="battery-bar">
                            <span class="battery-fill ${device.battery > 50 ? 'battery-high' : device.battery > 20 ? 'battery-medium' : 'battery-low'}" style="width: ${device.battery}%"></span>
                        </span>
                        ${device.battery}%
                    </td>
                    <td>${device.signal} dBm</td>
                    <td>
                        <div>${device.lastReading}</div>
                        <small>${device.lastUpdate}</small>
                    </td>
                </tr>
            `).join('');
        }

        function initChart() {
            const ctx = document.getElementById('statusChart').getContext('2d');
            const active = allDevices.filter(d => d.status === 'active').length;
            const inactive = allDevices.filter(d => d.status === 'inactive').length;
            const maintenance = allDevices.filter(d => d.status === 'maintenance').length;

            // Cores que funcionam bem nos dois temas
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Ativos', 'Inativos', 'Manutenção'],
                    datasets: [{
                        label: 'Dispositivos',
                        data: [active, inactive, maintenance],
                        backgroundColor: ['#10b981', '#ef4444', '#f59e0b'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { 
                        legend: { display: false }
                    },
                    scales: { 
                        y: { 
                            beginAtZero: true, 
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }

        renderStats();
        renderTable();
        initChart();

        function logout() {
            sessionStorage.removeItem('agroecho_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
