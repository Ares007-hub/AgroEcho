<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Echo - Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#eef7f1;
    --card:#ffffff;
    --primary:#1b8f5a;
    --primary-dark:#146c43;
    --blue:#2d7ff9;
    --text:#173524;
    --text-light:#5c7265;
    --border:#d7e8de;
    --shadow:rgba(16,88,52,0.08);
    --sidebar:linear-gradient(180deg,#0d3b2e 0%,#145c46 100%);
    --thead-bg:#f2f7f4;
    --hover-row:#f5faf7;
}

[data-theme="dark"]{
    --bg:#081c15;
    --card:#102820;
    --primary:#26b36f;
    --primary-dark:#1b8f5a;
    --blue:#5ea2ff;
    --text:#ecfff4;
    --text-light:#9fc3b0;
    --border:#1f4d3d;
    --shadow:rgba(0,0,0,0.3);
    --sidebar:linear-gradient(180deg,#04110d 0%,#0b241c 100%);
    --thead-bg:#1a2a1f;
    --hover-row:#1a3a2a;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:all 0.3s;
}



.container{
    display:flex;
    min-height:100vh;
}


.sidebar{
    width:280px;
    background:var(--sidebar);
    padding:2rem 1.5rem;
    position:fixed;
    height:100vh;
    color:white;
    display:flex;
    flex-direction:column;
    z-index:100;
}

.admin-header{
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
    padding-bottom:1.5rem;
    margin-bottom:2rem;
}

.admin-badge{
    background:#ffffff20;
    padding:8px 18px;
    border-radius:30px;
    font-size:0.75rem;
    font-weight:700;
    letter-spacing:1px;
    display:inline-block;
    margin-bottom:1rem;
}

.logo{
    font-size:2rem;
    font-weight:800;
    letter-spacing:1px;
}

.user-name{
    margin-top:8px;
    color:#c6e6d3;
    font-size:0.9rem;
}

.nav-menu{
    list-style:none;
    margin-top:2rem;
    flex:0.5;
}

.nav-item{
    margin-bottom:0.7rem;
}

.nav-link{
    display:flex;
    align-items:center;
    padding:14px 18px;
    border-radius:14px;
    text-decoration:none;
    color:#d8f3e3;
    transition:0.3s;
    font-weight:500;
}

.nav-link:hover,
.nav-link.active{
    background:rgba(255,255,255,0.12);
}

.bottom-links{
    border-top:1px solid rgba(255,255,255,0.1);
    padding-top:1rem;
}

.theme-toggle{
    width:100%;
    border:none;
    background:none;
    color:#d8f3e3;
    text-align:left;
    padding:14px 18px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
    margin-bottom:0.5rem;
    font-size:0.95rem;
}

.theme-toggle:hover{
    background:rgba(255,255,255,0.12);
}


.main{
    flex:1;
    margin-left:280px;
    padding:2rem;
}



.topbar{
    background:var(--card);
    border-radius:20px;
    padding:2rem;
    box-shadow:0 5px 25px var(--shadow);
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:2rem;
    border-left:6px solid var(--primary);
    transition:all 0.3s;
}

.topbar h2{
    font-size:2rem;
    margin-bottom:6px;
    color:var(--text);
}

.topbar p{
    color:var(--text-light);
}

.admin-badge-top{
    background:#dff5e8;
    color:#146c43;
    padding:10px 20px;
    border-radius:30px;
    font-weight:700;
    font-size:0.9rem;
}


.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1.5rem;
    margin-bottom:2rem;
}

.stat-card{
    background:var(--card);
    border-radius:20px;
    padding:1.5rem;
    box-shadow:0 5px 25px var(--shadow);
    border-left:6px solid var(--primary);
    transition:all 0.3s;
}

.stat-card:hover{
    transform:translateY(-3px);
}

.stat-number{
    font-size:2rem;
    font-weight:700;
    color:var(--primary);
    margin-bottom:8px;
}

.stat-label{
    color:var(--text-light);
    font-size:0.9rem;
}


.chart-box{
    background:var(--card);
    padding:1.5rem;
    border-radius:20px;
    box-shadow:0 5px 25px var(--shadow);
    margin-bottom:2rem;
    transition:all 0.3s;
}

.chart-box h3{
    margin-bottom:1.5rem;
    color:var(--text);
    font-size:1.3rem;
}


.table-box{
    background:var(--card);
    padding:1.5rem;
    border-radius:20px;
    box-shadow:0 5px 25px var(--shadow);
    overflow-x:auto;
    transition:all 0.3s;
}

.table-box h3{
    margin-bottom:1.5rem;
    color:var(--text);
    font-size:1.3rem;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:var(--thead-bg);
}

th{
    padding:15px;
    text-align:left;
    color:var(--text-light);
    font-size:0.85rem;
    text-transform:uppercase;
    font-weight:600;
    border-bottom:2px solid var(--border);
}

td{
    padding:15px;
    border-bottom:1px solid var(--border);
    color:var(--text);
}

tbody tr:hover{
    background:var(--hover-row);
}


.status{
    padding:7px 14px;
    border-radius:20px;
    font-size:0.8rem;
    font-weight:700;
    display:inline-block;
}

.active{
    background:#dff5e8;
    color:#146c43;
}

.inactive{
    background:#ffe2e2;
    color:#b42323;
}

.maintenance{
    background:#fff3d6;
    color:#9c6500;
}


.battery-bar{
    width:100px;
    height:8px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    display:inline-block;
    margin-right:8px;
    vertical-align:middle;
}

.battery-fill{
    height:100%;
    background:linear-gradient(90deg,var(--primary),var(--blue));
    border-radius:20px;
}

.battery-low{
    background:linear-gradient(90deg,#dc2626,#f59e0b);
}

.battery-medium{
    background:linear-gradient(90deg,#f59e0b,var(--primary));
}

.battery-high{
    background:linear-gradient(90deg,var(--primary),var(--blue));
}


@media(max-width:1100px){
    .stats{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:900px){
    .sidebar{
        width:220px;
    }
    .main{
        margin-left:220px;
    }
}

@media(max-width:768px){
    .sidebar{
        display:none;
    }
    .main{
        margin-left:0;
        padding:1rem;
    }
    .container{
        flex-direction:column;
    }
    .stats{
        grid-template-columns:1fr;
    }
    .topbar{
        flex-direction:column;
        gap:15px;
        text-align:center;
    }
}

</style>
</head>

<body>

<div class="container">


    <aside class="sidebar">

        <div class="admin-header">
            <span class="admin-badge">ADMINISTRADOR</span>
            <div class="logo">Echo</div>
            <div class="user-name" id="sidebarUserName"></div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link active"> Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="admin_criar_usuario.html" class="nav-link"> Gerenciar Usuários</a>
            </li>
        </ul>

        <div class="bottom-links">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
                Alternar Tema
            </button>
            <a href="index.html" class="nav-link">Página Inicial</a>
            <a href="#" class="nav-link" onclick="logout()">Sair</a>
        </div>

    </aside>

    <main class="main">

        <div class="topbar">
            <div>
                <h2>Painel Administrativo</h2>
                <p>Controle geral dos dispositivos conectados</p>
            </div>
            <div class="admin-badge-top">ADMIN</div>
        </div>


        <div class="stats" id="statsRow"></div>

  
        <div class="chart-box">
            <h3>Status dos Dispositivos</h3>
            <canvas id="statusChart" height="80"></canvas>
        </div>

 
        <div class="table-box">
            <h3>Dispositivos Conectados</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Proprietário</th>
                        <th>Status</th>
                        <th>Bateria</th>
                        <th>Sinal</th>
                    </tr>
                </thead>
                <tbody id="devicesTable"></tbody>
            </table>
        </div>

    </main>

</div>

<script>

const user = JSON.parse(sessionStorage.getItem('agroecho_user'));

if(!user){
    alert('Faça login novamente');
    window.location.href = 'index.html';
}

if(user.role !== 'admin'){
    alert('Acesso permitido apenas para administradores');
    window.location.href = 'user_dispositivos.html';
}

document.getElementById('sidebarUserName').textContent = user.name;


let theme = localStorage.getItem('agroecho_theme') || 'light';

function applyTheme(){
    if(theme === 'dark'){
        document.documentElement.setAttribute('data-theme','dark');
    } else {
        document.documentElement.removeAttribute('data-theme');
    }
}

function toggleTheme(){
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('agroecho_theme', theme);
    applyTheme();
}

applyTheme();


const allDevices = [
    {
        id:'ESP32-SOIL-001',
        name:'Sensor Umidade Solo',
        type:'Sensor Capacitivo v1.2',
        owner:'João Silva',
        status:'active',
        battery:87,
        signal:'-85 dBm'
    },
    {
        id:'ESP32-RAIN-002',
        name:'Pluviômetro Central',
        type:'Pluviômetro de Báscula',
        owner:'Maria Souza',
        status:'active',
        battery:92,
        signal:'-78 dBm'
    },
    {
        id:'ESP32-FLOW-003',
        name:'Sensor de Fluxo',
        type:'YF-S201',
        owner:'Carlos Lima',
        status:'active',
        battery:95,
        signal:'-72 dBm'
    },
    {
        id:'ESP32-TEMP-004',
        name:'Sensor Temperatura',
        type:'DS18B20',
        owner:'Ana Paula',
        status:'inactive',
        battery:12,
        signal:'-95 dBm'
    },
    {
        id:'ESP32-LUX-005',
        name:'Sensor Radiação Solar',
        type:'BH1750',
        owner:'Maria Souza',
        status:'active',
        battery:88,
        signal:'-76 dBm'
    },
    {
        id:'ESP32-SOIL-006',
        name:'Sensor Umidade Horta',
        type:'Sensor Capacitivo v1.2',
        owner:'Carlos Lima',
        status:'maintenance',
        battery:45,
        signal:'-82 dBm'
    }
];


function renderStats(){
    const active = allDevices.filter(function(d) { return d.status === 'active'; }).length;
    const inactive = allDevices.filter(function(d) { return d.status === 'inactive'; }).length;
    const maintenance = allDevices.filter(function(d) { return d.status === 'maintenance'; }).length;
    const avgBattery = Math.round(allDevices.reduce(function(acc, d) { return acc + d.battery; }, 0) / allDevices.length);

    document.getElementById('statsRow').innerHTML = 
        '<div class="stat-card">' +
            '<div class="stat-number">' + allDevices.length + '</div>' +
            '<div class="stat-label">Total de Dispositivos</div>' +
        '</div>' +
        '<div class="stat-card">' +
            '<div class="stat-number">' + active + '</div>' +
            '<div class="stat-label">Dispositivos Ativos</div>' +
        '</div>' +
        '<div class="stat-card">' +
            '<div class="stat-number">' + avgBattery + '%</div>' +
            '<div class="stat-label">Bateria Média</div>' +
        '</div>' +
        '<div class="stat-card">' +
            '<div class="stat-number">' + inactive + '</div>' +
            '<div class="stat-label"> Dispositivos Inativos</div>' +
        '</div>';
}


function renderTable(){
    document.getElementById('devicesTable').innerHTML = allDevices.map(function(device) {
        var statusLabel = device.status === 'active' ? 'Ativo' : device.status === 'inactive' ? 'Inativo' : 'Manutenção';
        var batteryClass = device.battery > 50 ? 'battery-high' : device.battery > 20 ? 'battery-medium' : 'battery-low';
        
        return '<tr>' +
            '<td><strong>' + device.id + '</strong></td>' +
            '<td>' + device.name + '</td>' +
            '<td>' + device.type + '</td>' +
            '<td>' + device.owner + '</td>' +
            '<td><span class="status ' + device.status + '">' + statusLabel + '</span></td>' +
            '<td>' +
                '<span class="battery-bar">' +
                    '<span class="battery-fill ' + batteryClass + '" style="width:' + device.battery + '%"></span>' +
                '</span>' +
                device.battery + '%' +
            '</td>' +
            '<td>' + device.signal + '</td>' +
        '</tr>';
    }).join('');
}


function initChart(){
    const active = allDevices.filter(function(d) { return d.status === 'active'; }).length;
    const inactive = allDevices.filter(function(d) { return d.status === 'inactive'; }).length;
    const maintenance = allDevices.filter(function(d) { return d.status === 'maintenance'; }).length;

    const ctx = document.getElementById('statusChart').getContext('2d');

    new Chart(ctx, {
        type:'bar',
        data:{
            labels:['Ativos','Inativos','Manutenção'],
            datasets:[{
                data:[active,inactive,maintenance],
                backgroundColor:[
                    '#1b8f5a',
                    '#dc2626',
                    '#2d7ff9'
                ],
                borderRadius:10
            }]
        },
        options:{
            responsive:true,
            plugins:{
                legend:{
                    display:false
                }
            },
            scales:{
                y:{
                    beginAtZero:true,
                    ticks:{
                        stepSize:1
                    }
                }
            }
        }
    });
}


function logout(){
    sessionStorage.removeItem('agroecho_user');
    window.location.href = 'index.html';
}


renderStats();
renderTable();
initChart();

</script>

</body>
</html>
