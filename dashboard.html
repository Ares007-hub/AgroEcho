<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgroEcho - Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --verde:#0b8f47;
    --azul:#0d6efd;
    --branco:#ffffff;
    --cinza:#f4f7fb;
    --texto:#1f2937;
    --borda:#dbe4f0;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:var(--cinza);
    color:var(--texto);
}

/* LAYOUT */

.container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:270px;
    background:linear-gradient(180deg, var(--verde), var(--azul));
    color:white;
    padding:30px 20px;
    position:fixed;
    height:100vh;
}

.logo-area{
    text-align:center;
    margin-bottom:40px;
}

.logo-area img{
    width:120px;
    margin-bottom:15px;
}

.logo-area h1{
    font-size:2rem;
}

.logo-area p{
    margin-top:8px;
    font-size:0.95rem;
    opacity:0.9;
}

.menu{
    list-style:none;
}

.menu li{
    margin-bottom:12px;
}

.menu a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px;
    border-radius:12px;
    color:white;
    text-decoration:none;
    transition:0.3s;
    font-weight:500;
}

.menu a:hover,
.menu a.active{
    background:rgba(255,255,255,0.15);
}

/* MAIN */

.main{
    flex:1;
    margin-left:270px;
    padding:30px;
}

/* TOPO */

.topbar{
    background:white;
    border-radius:20px;
    padding:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.topbar h2{
    font-size:2rem;
    color:var(--verde);
}

.topbar p{
    margin-top:5px;
    color:#666;
}

.admin-badge{
    background:linear-gradient(135deg,var(--verde),var(--azul));
    color:white;
    padding:12px 20px;
    border-radius:30px;
    font-weight:600;
}

/* CARDS */

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    border-left:6px solid var(--verde);
}

.card h3{
    font-size:2rem;
    margin-bottom:8px;
    color:var(--verde);
}

.card p{
    color:#666;
}

/* GRÁFICO */

.chart-box{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    margin-bottom:25px;
}

.chart-box h3{
    margin-bottom:20px;
    color:var(--verde);
}

/* TABELA */

.table-box{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    overflow-x:auto;
}

.table-box h3{
    margin-bottom:20px;
    color:var(--verde);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:var(--cinza);
}

th{
    padding:16px;
    text-align:left;
    color:var(--verde);
    font-size:0.9rem;
}

td{
    padding:16px;
    border-bottom:1px solid var(--borda);
}

tr:hover{
    background:#f9fbff;
}

/* STATUS */

.status{
    padding:8px 14px;
    border-radius:30px;
    font-size:0.85rem;
    font-weight:600;
    color:white;
}

.active{
    background:#16a34a;
}

.inactive{
    background:#dc2626;
}

.maintenance{
    background:#f59e0b;
}

/* BATERIA */

.battery{
    width:100px;
    height:10px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:5px;
}

.fill{
    height:100%;
    background:linear-gradient(90deg,var(--verde),var(--azul));
}

/* RESPONSIVO */

@media(max-width:1100px){

    .stats{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:850px){

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
    }

    .container{
        flex-direction:column;
    }

    .stats{
        grid-template-columns:1fr;
    }

    .topbar{
        flex-direction:column;
        gap:15px;
        text-align:center;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo-area">

            <img src="Logo.png">

            <h1>AgroEcho</h1>

            <p id="sidebarUserName"></p>

        </div>

        <ul class="menu">

            <li>
                <a href="dashboard.html" class="active">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="admin_criar_usuario.html">
                    Usuários
                </a>
            </li>

            <li>
                <a href="index.html">
                    Página Inicial
                </a>
            </li>

            <li>
                <a href="#" onclick="logout()">
                    Sair
                </a>
            </li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <div class="topbar">

            <div>

                <h2>Painel Administrativo</h2>

                <p>Controle geral dos dispositivos conectados</p>

            </div>

            <div class="admin-badge">

                ADMINISTRADOR

            </div>

        </div>

        <!-- CARDS -->

        <div class="stats" id="statsRow"></div>

        <!-- GRÁFICO -->

        <div class="chart-box">

            <h3>Status dos Dispositivos</h3>

            <canvas id="statusChart"></canvas>

        </div>

        <!-- TABELA -->

        <div class="table-box">

            <h3>Dispositivos Conectados</h3>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Proprietário</th>
                        <th>Status</th>
                        <th>Bateria</th>
                        <th>Sinal</th>

                    </tr>

                </thead>

                <tbody id="devicesTable"></tbody>

            </table>

        </div>

    </main>

</div>

<script>

/* LOGIN */

const user = JSON.parse(sessionStorage.getItem('agroecho_user'));

if(!user){

    alert('Faça login novamente');
    window.location.href = 'index.html';

}

if(user.role !== 'admin'){

    alert('Acesso permitido apenas para administradores');
    window.location.href = 'USER_DISPOSITIVOS.html';

}

document.getElementById('sidebarUserName').innerHTML = user.name;

/* DISPOSITIVOS */

const allDevices = [

{
    id:'ESP32-001',
    name:'Sensor Solo',
    type:'Capacitivo',
    owner:'João Silva',
    status:'active',
    battery:90,
    signal:'-72 dBm'
},

{
    id:'ESP32-002',
    name:'Pluviômetro',
    type:'Báscula',
    owner:'Maria Souza',
    status:'inactive',
    battery:20,
    signal:'-95 dBm'
},

{
    id:'ESP32-003',
    name:'Fluxo Água',
    type:'YF-S201',
    owner:'Carlos Lima',
    status:'maintenance',
    battery:55,
    signal:'-80 dBm'
},

{
    id:'ESP32-004',
    name:'Temperatura',
    type:'DS18B20',
    owner:'Ana Paula',
    status:'active',
    battery:82,
    signal:'-70 dBm'
}

];

/* CARDS */

function renderStats(){

    const active = allDevices.filter(d => d.status === 'active').length;

    const inactive = allDevices.filter(d => d.status === 'inactive').length;

    const maintenance = allDevices.filter(d => d.status === 'maintenance').length;

    document.getElementById('statsRow').innerHTML = `

    <div class="card">
        <h3>${allDevices.length}</h3>
        <p>Total de Dispositivos</p>
    </div>

    <div class="card">
        <h3>${active}</h3>
        <p>Ativos</p>
    </div>

    <div class="card">
        <h3>${inactive}</h3>
        <p>Inativos</p>
    </div>

    <div class="card">
        <h3>${maintenance}</h3>
        <p>Manutenção</p>
    </div>

    `;

}

/* TABELA */

function renderTable(){

    document.getElementById('devicesTable').innerHTML = allDevices.map(device => `

    <tr>

        <td>${device.id}</td>

        <td>${device.name}</td>

        <td>${device.type}</td>

        <td>${device.owner}</td>

        <td>
            <span class="status ${device.status}">
                ${device.status === 'active' ? 'Ativo' :
                device.status === 'inactive' ? 'Inativo' :
                'Manutenção'}
            </span>
        </td>

        <td>

            <div class="battery">
                <div class="fill" style="width:${device.battery}%"></div>
            </div>

            ${device.battery}%

        </td>

        <td>${device.signal}</td>

    </tr>

    `).join('');

}

/* GRÁFICO */

function initChart(){

    const active = allDevices.filter(d => d.status === 'active').length;

    const inactive = allDevices.filter(d => d.status === 'inactive').length;

    const maintenance = allDevices.filter(d => d.status === 'maintenance').length;

    const ctx = document.getElementById('statusChart');

    new Chart(ctx, {

        type:'bar',

        data:{

            labels:['Ativos','Inativos','Manutenção'],

            datasets:[{

                data:[active,inactive,maintenance],
                backgroundColor:[
                    '#0b8f47',
                    '#dc2626',
                    '#0d6efd'
                ],
                borderRadius:10

            }]

        },

        options:{
            responsive:true,
            plugins:{
                legend:{
                    display:false
                }
            },
            scales:{
                y:{
                    beginAtZero:true
                }
            }
        }

    });

}

/* LOGOUT */

function logout(){

    sessionStorage.removeItem('agroecho_user');

    window.location.href = 'index.html';

}

/* INICIAR */

renderStats();
renderTable();
initChart();

</script>

</body>
</html>
