<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - Sistema de Monitoramento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --sidebar: #ebffef;
            --card: #ffffff;
            --primary: #059669;
            --primary-hover: #059669;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #bdf3c7;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --card: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; transition: 0.3s; }

 
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo-area { 
            margin-bottom: 40px; 
            display: flex;
            justify-content: center; 
            align-items: center;    
            width: 100%;
        }

        .logo-img {
            max-width: 160px; 
            height: auto;
            object-fit: contain;
        }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
            text-decoration: none; color: var(--text-sub); font-weight: 500;
            border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }

        .nav-link.active { background: rgba(16, 185, 129, 0.1); color: var(--primary); }
        .nav-link:hover:not(.active) { background: var(--bg); color: var(--text-main); }

        /* MAIN */
        .main-content { margin-left: 260px; flex: 1; padding: 30px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .user-profile { 
            display: flex; align-items: center; gap: 12px; background: var(--card); 
            padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border);
        }

        .avatar { 
            width: 35px; height: 35px; background: var(--primary); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: white; cursor: pointer;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .stat-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .devices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .sensor-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        
        .sensor-value { font-size: 28px; font-weight: 700; margin: 10px 0; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .badge-active { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .badge-inactive { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-logout { background: var(--danger); color: white; font-size: 12px; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 300px; text-align: center; }
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .emoji-item { font-size: 20px; padding: 8px; cursor: pointer; border-radius: 8px; background: var(--bg); }

        /* TABELAS */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: var(--text-sub); border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <img src="Logo.png" alt="ECHO Logo" class="logo-img">
        </div>
        
        <nav>
            <div onclick="showPage('painel')" class="nav-link active" id="nav-painel">Painel Geral</div>
            <div onclick="showPage('mapas')" class="nav-link" id="nav-mapas">Mapas</div>
            <div onclick="showPage('relatorios')" class="nav-link" id="nav-relatorios">Relatórios</div>
            <div onclick="showPage('config')" class="nav-link" id="nav-config">Configurações</div>
        </nav>
        <button class="btn" id="adminBtn" style="display:none; margin-top: auto; background: var(--warning);">Admin</button>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <h2 id="welcomeText">Olá</h2>
                <p id="page-desc" style="color: var(--text-sub); font-size: 14px;">Monitoramento em tempo real</p>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="btn" style="background:none; font-size: 20px;" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <div class="user-profile">
                    <div class="avatar" id="avatar" onclick="openModal()">👤</div>
                    <span id="userName" style="font-weight: 600; font-size: 14px;">Usuário</span>
                    <button class="btn btn-logout" onclick="logout()">Sair</button>
                </div>
            </div>
        </header>

        <div id="dynamic-content"></div>
    </main>

    <div class="modal" id="avatarModal">
        <div class="modal-content">
            <h4>Trocar Avatar</h4>
            <div class="emoji-grid" id="emojiGrid"></div>
            <button class="btn" onclick="closeModal()">Fechar</button>
        </div>
    </div>

<script>
    const user = JSON.parse(sessionStorage.getItem('agroecho_user')) || {name: "kellem arielle", role: "admin", id: "1"};
    const devices = [
        { name:'Umidade Solo', id:'ESP32-SOIL-001', status:'active', reading:'869', unit:'kPa', battery:'87%', icon:'💧' },
        { name:'Pluviômetro', id:'ESP32-RAIN-002', status:'active', reading:'2.5', unit:'mm', battery:'92%', icon:'🌧️' },
        { name:'Temperatura', id:'ESP32-TEMP-004', status:'inactive', reading:'28.5', unit:'°C', battery:'12%', icon:'🌡️' }
    ];

    document.getElementById('welcomeText').innerText = 'Olá, ' + user.name;
    document.getElementById('userName').innerText = user.name;
    if(user.role === 'admin') document.getElementById('adminBtn').style.display = 'block';

    function showPage(page) {
        const content = document.getElementById('dynamic-content');
        const desc = document.getElementById('page-desc');
        
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('nav-' + page).classList.add('active');

        if(page === 'painel') {
            desc.innerText = "Monitoramento em tempo real dos seus sensores.";
            content.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(59,130,246,0.1); color:#3b82f6">📡</div>
                        <div><small>Total</small><h3>${devices.length}</h3></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(16,185,129,0.1); color:#10b981">✅</div>
                        <div><small>Ativos</small><h3>${devices.filter(d=>d.status==='active').length}</h3></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background:rgba(245,158,11,0.1); color:#f59e0b">🔋</div>
                        <div><small>Bateria</small><h3>64%</h3></div>
                    </div>
                </div>
                <div class="devices-grid">${devices.map(d => renderDeviceCard(d)).join('')}</div>
            `;
        } 
        else if(page === 'mapas') {
            desc.innerText = "Localização geográfica dos dispositivos.";
            content.innerHTML = `<div style="background:var(--card); height:450px; border-radius:20px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:15px; color:var(--text-sub)"><span style="font-size:60px">📍</span><h3>Mapa da Propriedade</h3><p>O Google Maps seria carregado nesta área.</p><div style="width:80%; height:200px; background:var(--bg); border:2px dashed var(--border); border-radius:15px"></div></div>`;
        }
        else if(page === 'relatorios') {
            desc.innerText = "Histórico de leituras e exportação de dados.";
            content.innerHTML = `<div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid var(--border)"><h3>Últimas Atividades</h3><table><thead><tr><th>Data</th><th>Sensor</th><th>Leitura</th><th>Status</th></tr></thead><tbody><tr><td>06/05/2026</td><td>Umidade Solo</td><td>869 kPa</td><td><span class="badge badge-active">OK</span></td></tr><tr><td>06/05/2026</td><td>Temperatura</td><td>28.5 °C</td><td><span class="badge badge-inactive">ALERTA</span></td></tr><tr><td>05/05/2026</td><td>Pluviômetro</td><td>1.2 mm</td><td><span class="badge badge-active">OK</span></td></tr></tbody></table><button class="btn" style="margin-top:20px; background:var(--primary); color:white">Exportar PDF</button></div>`;
        }
        else if(page === 'config') {
            desc.innerText = "Ajustes da conta e preferências do sistema.";
            content.innerHTML = `<div style="max-width:500px; background:var(--card); padding:25px; border-radius:20px; border:1px solid var(--border)"><div style="margin-bottom:15px"><label style="display:block; margin-bottom:5px; font-size:14px">Nome da Fazenda</label><input type="text" value="Fazenda Esperança" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text-main)"></div><div style="margin-bottom:15px"><label style="display:block; margin-bottom:5px; font-size:14px">Notificações de Alerta</label><select style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text-main)"><option>Ativado (E-mail + Push)</option><option>Somente Críticos</option><option>Desativado</option></select></div><button class="btn" style="background:var(--primary); color:white; width:100%">Salvar Configurações</button></div>`;
        }
    }

    function renderDeviceCard(d) {
        return `<div class="sensor-card"><div style="display:flex; justify-content:space-between"><div><h4 style="color:var(--text-sub)">${d.name}</h4><small style="font-family:monospace">${d.id}</small></div><span style="font-size:24px">${d.icon}</span></div><div class="sensor-value">${d.reading} <small style="font-size:14px; color:var(--text-sub)">${d.unit}</small></div><div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-top:15px; border-top:1px solid var(--border)"><span style="font-size:12px; color:${parseInt(d.battery)<20?'red':'inherit'}">🔋 ${d.battery}</span><span class="badge ${d.status==='active'?'badge-active':'badge-inactive'}">${d.status==='active'?'● Ativo':'● Inativo'}</span></div></div>`;
    }

    let theme = localStorage.getItem('theme') || 'light';
    function applyTheme() {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', theme); applyTheme(); }
    applyTheme();

    const emojis = ['👤','👨‍🌾','👩‍🌾','🚜','🌱','💧','🔧','☀️','👑','🌽'];
    document.getElementById('emojiGrid').innerHTML = emojis.map(e => `<div class="emoji-item" onclick="selectAvatar('${e}')">${e}</div>`).join('');
    function openModal() { document.getElementById('avatarModal').classList.add('active'); }
    function closeModal() { document.getElementById('avatarModal').classList.remove('active'); }
    function selectAvatar(e) { 
        document.getElementById('avatar').innerText = e; 
        localStorage.setItem('avatar_' + user.id, e); 
        closeModal(); 
    }
    document.getElementById('avatar').innerText = localStorage.getItem('avatar_' + user.id) || '👤';

    function logout() { sessionStorage.removeItem('agroecho_user'); window.location.href = 'index.html'; }

    showPage('painel');
</script>
</body>
</html>
