<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - Sistema de Monitoramento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg: #ffffff;
            --sidebar: #ebffef;
            --card: #ffffff;
            --primary: #059669;
            --primary-hover: #059669;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #bdf3c7;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --card: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; transition: 0.3s; }


        .sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo-area { 
            margin-bottom: 40px; 
            display: flex;
            justify-content: center; 
            align-items: center;    
            width: 100%;
        }

        .logo-img {
            max-width: 160px; 
            height: auto;
            object-fit: contain;
        }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
            text-decoration: none; color: var(--text-sub); font-weight: 500;
            border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }

        .nav-link.active { background: rgba(16, 185, 129, 0.1); color: var(--primary); }
        .nav-link:hover:not(.active) { background: var(--bg); color: var(--text-main); }


        .main-content { margin-left: 260px; flex: 1; padding: 30px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .user-profile { 
            display: flex; align-items: center; gap: 12px; background: var(--card); 
            padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border);
        }

        .avatar { 
            width: 35px; height: 35px; background: var(--primary); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: white; cursor: pointer;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .stat-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .devices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .sensor-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        
        .sensor-value { font-size: 28px; font-weight: 700; margin: 10px 0; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; display: inline-block; }
        .badge-active { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .badge-inactive { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-logout { background: var(--danger); color: white; font-size: 12px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 300px; text-align: center; }
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .emoji-item { font-size: 20px; padding: 8px; cursor: pointer; border-radius: 8px; background: var(--bg); transition: 0.2s; }
        .emoji-item:hover { background: var(--primary); color: white; transform: scale(1.1); }

  
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: var(--text-sub); border-bottom: 2px solid var(--border); font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tbody tr:hover { background: var(--bg); }

  
        .pdf-container {
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--border);
        }

        .pdf-header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 20px;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 600;
            z-index: 2000;
            animation: slideIn 0.3s, slideOut 0.3s 2.7s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100px); opacity: 0; }
        }

     
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-area">
            <img src="Logo.png" alt="ECHO Logo" class="logo-img">
        </div>
        
        <nav>
            <div onclick="showPage('painel')" class="nav-link active" id="nav-painel">Painel Geral</div>
            <div onclick="showPage('mapas')" class="nav-link" id="nav-mapas">Mapas</div>
            <div onclick="showPage('relatorios')" class="nav-link" id="nav-relatorios">Relatórios</div>
            <div onclick="showPage('config')" class="nav-link" id="nav-config">Configurações</div>
        </nav>
        
        <button class="btn" id="adminBtn" style="display:none; margin-top: auto; background: var(--warning); color: #000;" onclick="window.location.href='admin_criar_usuario.html'">
             Admin
        </button>
    </aside>


    <main class="main-content">
        <header class="topbar">
            <div>
                <h2 id="welcomeText">Olá</h2>
                <p id="page-desc" style="color: var(--text-sub); font-size: 14px;">Monitoramento em tempo real</p>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="btn" style="background:none; font-size: 20px;" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <div class="user-profile">
                    <div class="avatar" id="avatar" onclick="openModal()">👤</div>
                    <span id="userName" style="font-weight: 600; font-size: 14px;">Usuário</span>
                    <button class="btn btn-logout" onclick="logout()">Sair</button>
                </div>
            </div>
        </header>

        <div id="dynamic-content"></div>
    </main>

    <!-- MODAL AVATAR -->
    <div class="modal" id="avatarModal">
        <div class="modal-content">
            <h4> Trocar Avatar</h4>
            <div class="emoji-grid" id="emojiGrid"></div>
            <button class="btn btn-primary" onclick="closeModal()" style="width:100%;">Fechar</button>
        </div>

    <div id="toast" class="toast" style="display:none;"></div>

<script>

    const user = JSON.parse(sessionStorage.getItem('agroecho_user')) || {name: "Kellem Arielle", role: "admin", id: "1"};

    const devices = [
        { name:'Umidade Solo', id:'ESP32-SOIL-001', status:'active', reading:'869', unit:'kPa', battery:87, icon:'', location:'Setor Norte', lastUpdate:'2 min atrás' },
        { name:'Pluviômetro', id:'ESP32-RAIN-002', status:'active', reading:'2.5', unit:'mm', battery:92, icon:'', location:'Setor Central', lastUpdate:'5 min atrás' },
        { name:'Sensor de Fluxo', id:'ESP32-FLOW-003', status:'active', reading:'12.3', unit:'L/min', battery:95, icon:'', location:'Bomba Principal', lastUpdate:'1 min atrás' },
        { name:'Temperatura', id:'ESP32-TEMP-004', status:'inactive', reading:'28.5', unit:'°C', battery:12, icon:'', location:'Estufa 1', lastUpdate:'3 horas atrás' },
        { name:'Radiação Solar', id:'ESP32-LUX-005', status:'active', reading:'624', unit:'lux', battery:88, icon:'', location:'Área Central', lastUpdate:'10 min atrás' }
    ];

    const reports = [
        { date:'06/05/2026 14:30', sensor:'Umidade Solo', reading:'869 kPa', status:'active', statusLabel:'Normal' },
        { date:'06/05/2026 14:25', sensor:'Pluviômetro', reading:'2.5 mm', status:'active', statusLabel:'Normal' },
        { date:'06/05/2026 14:20', sensor:'Sensor de Fluxo', reading:'12.3 L/min', status:'active', statusLabel:'Normal' },
        { date:'06/05/2026 12:00', sensor:'Temperatura', reading:'28.5 °C', status:'inactive', statusLabel:'Alerta - Bateria Baixa' },
        { date:'05/05/2026 18:45', sensor:'Umidade Solo', reading:'845 kPa', status:'active', statusLabel:'Normal' },
        { date:'05/05/2026 18:30', sensor:'Pluviômetro', reading:'1.2 mm', status:'active', statusLabel:'Normal' },
        { date:'05/05/2026 10:15', sensor:'Radiação Solar', reading:'580 lux', status:'active', statusLabel:'Normal' },
        { date:'04/05/2026 22:00', sensor:'Temperatura', reading:'26.1 °C', status:'active', statusLabel:'Normal' }
    ];


    document.getElementById('welcomeText').innerText = 'Olá, ' + user.name;
    document.getElementById('userName').innerText = user.name;
    
    if(user.role === 'admin') {
        document.getElementById('adminBtn').style.display = 'block';
    }


    function showPage(page) {
        const content = document.getElementById('dynamic-content');
        const desc = document.getElementById('page-desc');
        
        // Atualizar navegação ativa
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('nav-' + page).classList.add('active');

        // Renderizar página
        switch(page) {
            case 'painel':
                desc.innerText = "Monitoramento em tempo real dos seus sensores.";
                renderPainel(content);
                break;
            case 'mapas':
                desc.innerText = "Localização geográfica dos dispositivos.";
                renderMapas(content);
                break;
            case 'relatorios':
                desc.innerText = "Histórico de leituras e exportação de dados.";
                renderRelatorios(content);
                break;
            case 'config':
                desc.innerText = "Ajustes da conta e preferências do sistema.";
                renderConfig(content);
                break;
        }
    }

    function renderPainel(content) {
        const activeCount = devices.filter(d => d.status === 'active').length;
        const avgBattery = Math.round(devices.reduce((acc, d) => acc + d.battery, 0) / devices.length);
        
        content.innerHTML = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div><small style="color:var(--text-sub)">Total de Dispositivos</small><h3>${devices.length}</h3></div>
                </div>
                <div class="stat-card">
                    <div><small style="color:var(--text-sub)">Ativos</small><h3>${activeCount}</h3></div>
                </div>
                <div class="stat-card">
                    <div><small style="color:var(--text-sub)">Bateria Média</small><h3>${avgBattery}%</h3></div>
                </div>
                <div class="stat-card">
                    <div><small style="color:var(--text-sub)">Alertas</small><h3>${devices.filter(d => d.battery < 20).length}</h3></div>
                </div>
            </div>
            <div class="devices-grid">
                ${devices.map(d => renderDeviceCard(d)).join('')}
            </div>
        `;
    }

    function renderDeviceCard(d) {
        const batteryColor = d.battery < 20 ? '#ef4444' : d.battery < 50 ? '#f59e0b' : '#10b981';
        return `
            <div class="sensor-card">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div>
                        <h4 style="color:var(--text-sub); font-size:0.9rem;">${d.name}</h4>
                        <small style="font-family:monospace; color:var(--text-sub);">${d.id}</small>
                    </div>
                    <span style="font-size:28px;">${d.icon}</span>
                </div>
                <div class="sensor-value">${d.reading} <small style="font-size:14px; color:var(--text-sub);">${d.unit}</small></div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-top:15px; border-top:1px solid var(--border);">
                    <span style="font-size:12px; color:${batteryColor};">
                        🔋 ${d.battery}%
                    </span>
                    <span style="font-size:12px; color:var(--text-sub);">📍 ${d.location}</span>
                    <span class="badge ${d.status==='active'?'badge-active':'badge-inactive'}">
                        ${d.status==='active'?'● Ativo':'● Inativo'}
                    </span>
                </div>
                <div style="margin-top:8px; font-size:11px; color:var(--text-sub); text-align:right;">
                    Atualizado: ${d.lastUpdate}
                </div>
            </div>
        `;
    }


    function renderMapas(content) {
        content.innerHTML = `
            <div style="background:var(--card); border-radius:20px; border:1px solid var(--border); overflow:hidden;">
                <div style="padding:20px; border-bottom:1px solid var(--border);">
                    <h3> Localização dos Dispositivos</h3>
                    <p style="color:var(--text-sub); font-size:14px;">Visão geral da propriedade</p>
                </div>
                <div style="height:400px; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:15px;">
                    <span style="font-size:60px;">🗺️</span>
                    <p style="color:var(--text-sub);">Mapa interativo seria carregado aqui</p>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; padding:20px;">
                        ${devices.map(d => `
                            <div style="background:var(--card); padding:10px 15px; border-radius:10px; border:1px solid var(--border); text-align:center;">
                                <span style="font-size:24px;">${d.icon}</span>
                                <div style="font-size:12px; margin-top:5px;">${d.location}</div>
                                <div style="font-size:10px; color:var(--text-sub);">${d.name}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
    }


    function renderRelatorios(content) {
        content.innerHTML = `
            <div class="pdf-container" id="pdfContent">

                <div class="pdf-header">
                    <h2 style="color:var(--primary);"> Relatório de Monitoramento</h2>
                    <p style="color:var(--text-sub);">Gerado em: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}</p>
                    <p style="color:var(--text-sub);">Usuário: ${user.name}</p>
                </div>

                
                <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin-bottom:20px;">
                    <div style="background:var(--bg); padding:15px; border-radius:10px; text-align:center;">
                        <div style="font-size:24px; font-weight:700; color:var(--primary);">${devices.length}</div>
                        <div style="font-size:12px; color:var(--text-sub);">Total de Sensores</div>
                    </div>
                    <div style="background:var(--bg); padding:15px; border-radius:10px; text-align:center;">
                        <div style="font-size:24px; font-weight:700; color:#10b981;">${devices.filter(d=>d.status==='active').length}</div>
                        <div style="font-size:12px; color:var(--text-sub);">Sensores Ativos</div>
                    </div>
                    <div style="background:var(--bg); padding:15px; border-radius:10px; text-align:center;">
                        <div style="font-size:24px; font-weight:700; color:#ef4444;">${devices.filter(d=>d.status==='inactive').length}</div>
                        <div style="font-size:12px; color:var(--text-sub);">Sensores Inativos</div>
                    </div>
                </div>

             
                <h3 style="margin-bottom:10px;"> Histórico de Leituras</h3>
                <table id="reportTable">
                    <thead>
                        <tr>
                            <th>Data/Hora</th>
                            <th>Sensor</th>
                            <th>Leitura</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${reports.map(r => `
                            <tr>
                                <td>${r.date}</td>
                                <td>${r.sensor}</td>
                                <td><strong>${r.reading}</strong></td>
                                <td><span class="badge ${r.status==='active'?'badge-active':'badge-inactive'}">${r.statusLabel}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>

       
                <h3 style="margin-top:25px; margin-bottom:10px;">📡 Dispositivos</h3>
                <table id="devicesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Localização</th>
                            <th>Bateria</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${devices.map(d => `
                            <tr>
                                <td style="font-family:monospace;">${d.id}</td>
                                <td>${d.icon} ${d.name}</td>
                                <td>${d.location}</td>
                                <td>${d.battery}%</td>
                                <td><span class="badge ${d.status==='active'?'badge-active':'badge-inactive'}">${d.status==='active'?'Ativo':'Inativo'}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>

      
            <div style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="exportToExcel()" id="excelBtn" style="display:flex; align-items:center; gap:8px; background:#217346;">
                     Exportar Excel
                </button>
                <button class="btn btn-primary" onclick="exportToPDF()" id="exportBtn" style="display:flex; align-items:center; gap:8px;">
                     Exportar PDF
                </button>
                <button class="btn" style="background:var(--bg); border:1px solid var(--border);" onclick="printReport()">
                     Imprimir
                </button>
            </div>
        `;
    }



    function exportToExcel() {
        const btn = document.getElementById('excelBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Gerando Excel...';
        
        try {
            const wb = XLSX.utils.book_new();
            
  
            const borderStyle = {
                top: { style: 'thin', color: { rgb: '059669' } },
                bottom: { style: 'thin', color: { rgb: '059669' } },
                left: { style: 'thin', color: { rgb: '059669' } },
                right: { style: 'thin', color: { rgb: '059669' } }
            };

            const headerStyle = {
                font: { bold: true, sz: 11, color: { rgb: 'FFFFFF' }, name: 'Calibri' },
                fill: { fgColor: { rgb: '059669' } },
                alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
                border: {
                    top: { style: 'medium', color: { rgb: '047857' } },
                    bottom: { style: 'medium', color: { rgb: '047857' } },
                    left: { style: 'medium', color: { rgb: '047857' } },
                    right: { style: 'medium', color: { rgb: '047857' } }
                }
            };

            function addBorders(ws, startRow, endRow, colCount) {
                for (let r = startRow; r <= endRow; r++) {
                    for (let c = 0; c < colCount; c++) {
                        const cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                        if (ws[cellRef]) {
                            if (!ws[cellRef].s) ws[cellRef].s = {};
                            ws[cellRef].s.border = borderStyle;
                        }
                    }
                }
            }

     
            const capaData = [
                [''],
                [''],
                ['RELATÓRIO DE MONITORAMENTO'],
                ['AGROECHO - IRRIGAÇÃO INTELIGENTE'],
                [''],
                ['Data:', new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })],
                ['Hora:', new Date().toLocaleTimeString('pt-BR')],
                ['Usuário:', user.name],
                ['Acesso:', user.role === 'admin' ? 'Administrador' : 'Usuário'],
                [''],
                ['RESUMO DO SISTEMA'],
                [''],
                ['Total de Dispositivos:', devices.length],
                ['Dispositivos Ativos:', devices.filter(d => d.status === 'active').length + ' (' + Math.round(devices.filter(d => d.status === 'active').length / devices.length * 100) + '%)'],
                ['Dispositivos Inativos:', devices.filter(d => d.status === 'inactive').length + ' (' + Math.round(devices.filter(d => d.status === 'inactive').length / devices.length * 100) + '%)'],
                ['Bateria Média:', Math.round(devices.reduce((acc, d) => acc + d.battery, 0) / devices.length) + '%'],
                ['Bateria Crítica (<20%):', devices.filter(d => d.battery < 20).length],
                [''],
                ['Registros no Histórico:', reports.length],
                ['Período:', reports[reports.length - 1].date + ' até ' + reports[0].date],
                ['Alertas:', reports.filter(r => r.status === 'inactive').length]
            ];
            
            const wsCapa = XLSX.utils.aoa_to_sheet(capaData);
            wsCapa['!cols'] = [{ wch: 45 }, { wch: 45 }];
            wsCapa['!merges'] = [
                { s: { r: 2, c: 0 }, e: { r: 2, c: 1 } },
                { s: { r: 3, c: 0 }, e: { r: 3, c: 1 } },
                { s: { r: 10, c: 0 }, e: { r: 10, c: 1 } }
            ];
            

            const titleCell = XLSX.utils.encode_cell({ r: 2, c: 0 });
            if (wsCapa[titleCell]) {
                wsCapa[titleCell].s = {
                    font: { bold: true, sz: 22, color: { rgb: '059669' }, name: 'Calibri' },
                    alignment: { horizontal: 'center', vertical: 'center' },
                    fill: { fgColor: { rgb: 'D1FAE5' } },
                    border: {
                        top: { style: 'medium', color: { rgb: '059669' } },
                        bottom: { style: 'medium', color: { rgb: '059669' } },
                        left: { style: 'medium', color: { rgb: '059669' } },
                        right: { style: 'medium', color: { rgb: '059669' } }
                    }
                };
            }


            const subCell = XLSX.utils.encode_cell({ r: 3, c: 0 });
            if (wsCapa[subCell]) {
                wsCapa[subCell].s = {
                    font: { bold: true, sz: 13, color: { rgb: '047857' }, name: 'Calibri' },
                    alignment: { horizontal: 'center', vertical: 'center' }
                };
            }


            const resumoCell = XLSX.utils.encode_cell({ r: 10, c: 0 });
            if (wsCapa[resumoCell]) {
                wsCapa[resumoCell].s = {
                    font: { bold: true, sz: 14, color: { rgb: 'FFFFFF' }, name: 'Calibri' },
                    alignment: { horizontal: 'center', vertical: 'center' },
                    fill: { fgColor: { rgb: '059669' } },
                    border: {
                        top: { style: 'medium', color: { rgb: '047857' } },
                        bottom: { style: 'medium', color: { rgb: '047857' } },
                        left: { style: 'medium', color: { rgb: '047857' } },
                        right: { style: 'medium', color: { rgb: '047857' } }
                    }
                };
            }


            for (let r = 5; r <= 8; r++) {
                for (let c = 0; c < 2; c++) {
                    const cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                    if (wsCapa[cellRef] && !wsCapa[cellRef].s) {
                        wsCapa[cellRef].s = { border: borderStyle };
                    }
                }
            }

            XLSX.utils.book_append_sheet(wb, wsCapa, ' Capa');

            const leiturasData = [
                ['DATA/HORA', 'SENSOR', 'ID DISPOSITIVO', 'LEITURA', 'VALOR', 'UNIDADE', 'STATUS', 'OBSERVAÇÃO']
            ];
            
            reports.forEach(function(r) {
                const device = devices.find(d => r.sensor.includes(d.name.split(' ')[0])) || devices[0];
                const numericValue = parseFloat(r.reading.replace(/[^0-9.]/g, ''));
                const unit = r.reading.replace(/[0-9.\s]/g, '').trim();
                
                leiturasData.push([
                    r.date,
                    r.sensor,
                    device ? device.id : 'N/A',
                    r.reading,
                    numericValue || 0,
                    unit || '-',
                    r.statusLabel,
                    r.status === 'inactive' ? '⚠️ Requer atenção' : '✅ Normal'
                ]);
            });
            
            const wsLeituras = XLSX.utils.aoa_to_sheet(leiturasData);
            wsLeituras['!cols'] = [
                { wch: 22 }, { wch: 25 }, { wch: 20 }, { wch: 15 },
                { wch: 12 }, { wch: 10 }, { wch: 22 }, { wch: 25 }
            ];
            

            for (let i = 0; i < 8; i++) {
                const cellRef = XLSX.utils.encode_cell({ r: 0, c: i });
                if (wsLeituras[cellRef]) wsLeituras[cellRef].s = headerStyle;
            }

            for (let r = 1; r < leiturasData.length; r++) {
                const isAlert = leiturasData[r][7].includes('⚠️');
                for (let c = 0; c < 8; c++) {
                    const cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                    if (wsLeituras[cellRef]) {
                        wsLeituras[cellRef].s = {
                            font: { sz: 10, name: 'Calibri', bold: isAlert, color: isAlert ? { rgb: '991B1B' } : { rgb: '1F2937' } },
                            fill: { fgColor: { rgb: isAlert ? 'FEE2E2' : r % 2 === 0 ? 'F0FDF4' : 'FFFFFF' } },
                            border: borderStyle,
                            alignment: { vertical: 'center' }
                        };
                    }
                }
            }
            
            XLSX.utils.book_append_sheet(wb, wsLeituras, ' Histórico');

            const dispositivosData = [
                ['ID', 'NOME', 'TIPO', 'LOCALIZAÇÃO', 'BATERIA', 'NÍVEL', 'ÚLTIMA LEITURA', 'ATUALIZAÇÃO', 'STATUS']
            ];
            
            devices.forEach(function(d) {
                const nivel = d.battery > 70 ? 'Alto' : d.battery > 40 ? ' Médio' : d.battery > 20 ? ' Baixo' : ' Crítico';
                
                dispositivosData.push([
                    d.id, d.name, d.unit, d.location, d.battery + '%',
                    nivel, d.reading + ' ' + d.unit, d.lastUpdate,
                    d.status === 'active' ? 'ATIVO' : 'INATIVO'
                ]);
            });
            
            const wsDispositivos = XLSX.utils.aoa_to_sheet(dispositivosData);
            wsDispositivos['!cols'] = [
                { wch: 20 }, { wch: 25 }, { wch: 10 }, { wch: 20 },
                { wch: 10 }, { wch: 14 }, { wch: 15 }, { wch: 18 }, { wch: 10 }
            ];
            

            for (let i = 0; i < 9; i++) {
                const cellRef = XLSX.utils.encode_cell({ r: 0, c: i });
                if (wsDispositivos[cellRef]) wsDispositivos[cellRef].s = headerStyle;
            }
            

            for (let r = 1; r < dispositivosData.length; r++) {
                const isInactive = dispositivosData[r][8] === 'INATIVO';
                for (let c = 0; c < 9; c++) {
                    const cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                    if (wsDispositivos[cellRef]) {
                        wsDispositivos[cellRef].s = {
                            font: { sz: 10, name: 'Calibri', bold: isInactive, color: isInactive ? { rgb: '991B1B' } : { rgb: '1F2937' } },
                            fill: { fgColor: { rgb: isInactive ? 'FEE2E2' : r % 2 === 0 ? 'F0FDF4' : 'FFFFFF' } },
                            border: borderStyle,
                            alignment: { vertical: 'center' }
                        };
                    }
                }
            }
            
            XLSX.utils.book_append_sheet(wb, wsDispositivos, ' Dispositivos');

            const bateriaData = [
                ['DISPOSITIVO', 'BATERIA', 'NÍVEL', 'STATUS', 'RECOMENDAÇÃO']
            ];
            
            devices.forEach(function(d) {
                const nivel = d.battery > 70 ? 'Alto' : d.battery > 40 ? 'Médio' : d.battery > 20 ? 'Baixo' : 'Crítico';
                const recomendacao = d.battery > 70 ? ' OK - Nenhuma ação necessária' : 
                                     d.battery > 40 ? ' Monitorar - Verificar em 7 dias' : 
                                     d.battery > 20 ? ' Atenção - Recarregar em 3 dias' : 
                                     ' URGENTE - Recarregar imediatamente';
                
                bateriaData.push([d.name, d.battery + '%', nivel, d.status === 'active' ? 'Ativo' : 'Inativo', recomendacao]);
            });
            
            const wsBateria = XLSX.utils.aoa_to_sheet(bateriaData);
            wsBateria['!cols'] = [{ wch: 25 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 45 }];
            
            for (let i = 0; i < 5; i++) {
                const cellRef = XLSX.utils.encode_cell({ r: 0, c: i });
                if (wsBateria[cellRef]) wsBateria[cellRef].s = headerStyle;
            }
            
            for (let r = 1; r < bateriaData.length; r++) {
                for (let c = 0; c < 5; c++) {
                    const cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                    if (wsBateria[cellRef]) {
                        wsBateria[cellRef].s = {
                            font: { sz: 10, name: 'Calibri' },
                            fill: { fgColor: { rgb: r % 2 === 0 ? 'F0FDF4' : 'FFFFFF' } },
                            border: borderStyle,
                            alignment: { vertical: 'center', wrapText: true }
                        };
                    }
                }
            }
            
            XLSX.utils.book_append_sheet(wb, wsBateria, ' Bateria');

            const estatisticasData = [
                ['ESTATÍSTICAS DO SISTEMA'],
                [''],
                ['Métrica', 'Valor', 'Percentual'],
                ['Total de Dispositivos', devices.length, '100%'],
                ['Dispositivos Ativos', devices.filter(d => d.status === 'active').length, Math.round(devices.filter(d => d.status === 'active').length / devices.length * 100) + '%'],
                ['Dispositivos Inativos', devices.filter(d => d.status === 'inactive').length, Math.round(devices.filter(d => d.status === 'inactive').length / devices.length * 100) + '%'],
                ['Bateria Média', Math.round(devices.reduce((acc, d) => acc + d.battery, 0) / devices.length) + '%', '-'],
                ['Bateria Máxima', Math.max(...devices.map(d => d.battery)) + '%', '-'],
                ['Bateria Mínima', Math.min(...devices.map(d => d.battery)) + '%', '-'],
                [''],
                ['Total de Leituras', reports.length, '-'],
                ['Leituras Normais', reports.filter(r => r.status === 'active').length, Math.round(reports.filter(r => r.status === 'active').length / reports.length * 100) + '%'],
                ['Leituras com Alerta', reports.filter(r => r.status === 'inactive').length, Math.round(reports.filter(r => r.status === 'inactive').length / reports.length * 100) + '%'],
                [''],
                ['Período:', reports[reports.length - 1].date + ' a ' + reports[0].date, '-']
            ];
            
            const wsEstatisticas = XLSX.utils.aoa_to_sheet(estatisticasData);
            wsEstatisticas['!cols'] = [{ wch: 35 }, { wch: 25 }, { wch: 15 }];
            wsEstatisticas['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 2 } }];

            const statTitle = XLSX.utils.encode_cell({ r: 0, c: 0 });
            if (wsEstatisticas[statTitle]) {
                wsEstatisticas[statTitle].s = {
                    font: { bold: true, sz: 14, color: { rgb: 'FFFFFF' }, name: 'Calibri' },
                    fill: { fgColor: { rgb: '059669' } },
                    alignment: { horizontal: 'center', vertical: 'center' },
                    border: { top: { style: 'medium', color: { rgb: '047857' } }, bottom: { style: 'medium', color: { rgb: '047857' } }, left: { style: 'medium', color: { rgb: '047857' } }, right: { style: 'medium', color: { rgb: '047857' } } }
                };
            }
            

            for (let i = 0; i < 3; i++) {
                const cellRef = XLSX.utils.encode_cell({ r: 2, c: i });
                if (wsEstatisticas[cellRef]) wsEstatisticas[cellRef].s = headerStyle;
            }
                        for (let r = 3; r < estatisticasData.length; r++) {
                for (let c = 0; c < 3; c++) {
                    const cellRef = XLSX.utils.encode_cell({ r: r, c: c });
                    if (wsEstatisticas[cellRef] && estatisticasData[r][c] !== '' && estatisticasData[r][c] !== '-') {
                        wsEstatisticas[cellRef].s = {
                            font: { sz: 10, name: 'Calibri' },
                            fill: { fgColor: { rgb: r % 2 === 0 ? 'F0FDF4' : 'FFFFFF' } },
                            border: borderStyle,
                            alignment: { vertical: 'center' }
                        };
                    }
                }
            }
            
            XLSX.utils.book_append_sheet(wb, wsEstatisticas, ' Estatísticas');
            

            const fileName = 'Relatorio_AgroEcho_' + new Date().toISOString().split('T')[0] + '.xlsx';
            XLSX.writeFile(wb, fileName);
            
            btn.disabled = false;
            btn.innerHTML = ' Exportar Excel';
            showToast('Excel exportado com bordas!');
            
        } catch (error) {
            console.error('Erro:', error);
            btn.disabled = false;
            btn.innerHTML = ' Exportar Excel';
            showToast(' Erro. Tente novamente.');
        }
    }

    function exportToPDF() {
        const element = document.getElementById('pdfContent');
        const btn = document.getElementById('exportBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Gerando PDF...';

        const opt = {
            margin:        [8, 8, 8, 8],
            filename:      'Relatorio_AgroEcho_' + new Date().toISOString().split('T')[0] + '.pdf',
            image:         { type: 'jpeg', quality: 1.0 },
            html2canvas:   { 
                scale: 2,
                useCORS: true,
                letterRendering: true,
                logging: false,
                backgroundColor: '#ffffff'
            },
            jsPDF:         { 
                unit: 'mm', 
                format: 'a4', 
                orientation: 'portrait' 
            },
            pagebreak:     { mode: ['avoid-all', 'css', 'legacy'] }
        };

        html2pdf()
            .set(opt)
            .from(element)
            .save()
            .then(function() {
                btn.disabled = false;
                btn.innerHTML = ' Exportar PDF';
                showToast(' PDF exportado!');
            })
            .catch(function(error) {
                console.error('Erro:', error);
                btn.disabled = false;
                btn.innerHTML = ' Exportar PDF';
                showToast(' Erro. Tente novamente.');
            });
    }

    function renderConfig(content) {
        content.innerHTML = `
            <div style="max-width:500px; background:var(--card); padding:25px; border-radius:20px; border:1px solid var(--border);">
                <h3 style="margin-bottom:20px;"> Configurações</h3>
                
                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; font-weight:600;">Nome da Fazenda</label>
                    <input type="text" id="farmName" value="Fazenda Esperança" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text-main); font-size:14px;">
                </div>
                
                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; font-weight:600;">Email para Alertas</label>
                    <input type="email" id="alertEmail" value="${user.email || 'admin@agroecho.com.br'}" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text-main); font-size:14px;">
                </div>
                
                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; font-weight:600;">Notificações</label>
                    <select id="notifications" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text-main); font-size:14px;">
                        <option>Ativado (E-mail + Push)</option>
                        <option>Somente Alertas Críticos</option>
                        <option>Desativado</option>
                    </select>
                </div>
                
                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:5px; font-size:14px; font-weight:600;">Intervalo de Leitura</label>
                    <select id="readingInterval" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text-main); font-size:14px;">
                        <option>5 minutos</option>
                        <option>10 minutos</option>
                        <option>30 minutos</option>
                        <option>1 hora</option>
                    </select>
                </div>
                
                <button class="btn btn-primary" onclick="saveConfig()" style="width:100%; padding:12px; font-size:16px;">
                     Salvar Configurações
                </button>
            </div>
        `;
    }

    function saveConfig() {
        const farmName = document.getElementById('farmName').value;
        const alertEmail = document.getElementById('alertEmail').value;
        
  
        const config = {
            farmName: farmName,
            alertEmail: alertEmail,
            notifications: document.getElementById('notifications').value,
            readingInterval: document.getElementById('readingInterval').value,
            savedAt: new Date().toISOString()
        };
        
        localStorage.setItem('agroecho_config', JSON.stringify(config));
        showToast('Configurações salvas com sucesso!');
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'block';
        

        toast.offsetHeight;
        
        toast.style.animation = 'slideIn 0.3s, slideOut 0.3s 2.7s';
        
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    let theme = localStorage.getItem('agroecho_theme') || 'light';
    
    function applyTheme() {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
    }
    
    function toggleTheme() {
        theme = theme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('agroecho_theme', theme);
        applyTheme();
    }
    
    applyTheme();


    const emojis = ['👤','👨‍🌾','👩‍🌾','🚜','🌱','💧','🔧','☀️','👑','🌽','🐄','🌻'];
    
    document.getElementById('emojiGrid').innerHTML = emojis.map(e => 
        `<div class="emoji-item" onclick="selectAvatar('${e}')">${e}</div>`
    ).join('');
    
    function openModal() { 
        document.getElementById('avatarModal').classList.add('active'); 
    }
    
    function closeModal() { 
        document.getElementById('avatarModal').classList.remove('active'); 
    }
    
    function selectAvatar(e) { 
        document.getElementById('avatar').innerText = e; 
        localStorage.setItem('avatar_' + user.id, e); 
        closeModal();
        showToast('🎨 Avatar atualizado!');
    }
    

    const savedAvatar = localStorage.getItem('avatar_' + user.id);
    if (savedAvatar) {
        document.getElementById('avatar').innerText = savedAvatar;
    }


    document.getElementById('avatarModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    function logout() { 
        sessionStorage.removeItem('agroecho_user'); 
        window.location.href = 'index.html'; 
    }

    showPage('painel');
</script>
