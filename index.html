<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroEcho - Login</title>

<style>
    :root {
        --verde-pastel: #bdf3c7;
        --verde-firme: #0b8f47;
        --branco: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, var(--branco), var(--verde-pastel), var(--branco));
        /* Removido o overflow hidden para permitir scroll na página se necessário */
        padding: 20px;
    }

    .container {
        width: 1000px;
        max-width: 100%;
        /* Trocado de height fixo para min-height para ser expansivo */
        min-height: 600px; 
        background: var(--branco);
        border-radius: 30px;
        display: flex;
        box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        overflow: hidden;
        position: relative;
        animation: surge 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    @keyframes surge {
        from { opacity: 0; transform: scale(0.9) translateY(40px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .left-side {
        width: 45%;
        background: var(--branco);
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .logo-img {
        width: 260px;
        z-index: 1;
        animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
    }

    .left-side p {
        color: var(--verde-firme);
        text-align: center;
        font-size: 0.95rem;
        line-height: 1.5;
        margin-top: 20px;
        z-index: 1;
    }

    .right-side {
        width: 55%;
        background: var(--verde-pastel);
        padding: 40px;
        display: flex;
        flex-direction: column;
        /* Garante que o lado direito ocupe a altura do container */
        justify-content: flex-start;
    }

    .tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 2px solid rgba(0,0,0,0.05);
    }

    .tab {
        flex: 1;
        padding: 12px;
        border: none;
        background: none;
        font-weight: bold;
        color: rgba(0,0,0,0.4);
        cursor: pointer;
        transition: 0.3s;
    }

    .tab.active {
        color: var(--verde-firme);
        border-bottom: 3px solid var(--verde-firme);
    }

    /* Ajuste do Wrapper para o Scroll Funcionar */
    .tabs-wrapper {
        flex: 1;
        overflow-y: auto; 
        max-height: 450px; /* Limite de altura para ativar o scroll interno */
        padding-right: 10px;
    }

    /* Estilização da barra de rolagem */
    .tabs-wrapper::-webkit-scrollbar { width: 6px; }
    .tabs-wrapper::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; }
    .tabs-wrapper::-webkit-scrollbar-thumb { background: var(--verde-firme); border-radius: 10px; }

    .tab-content { display: none; animation: slideIn 0.4s ease-out; }
    .tab-content.active { display: block; }

    @keyframes slideIn {
        from { opacity: 0; transform: translateX(10px); }
        to { opacity: 1; transform: translateX(0); }
    }

    .form-title { color: var(--verde-firme); font-size: 2rem; margin-bottom: 5px; }
    .form-subtitle { color: #555; margin-bottom: 15px; font-size: 0.9rem; }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .full-width { grid-column: span 2; }
    .form-group { margin-bottom: 10px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; color: #333; }

    input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid transparent;
        outline: none;
        font-size: 0.9rem;
    }

    input:focus { border-color: var(--verde-firme); box-shadow: 0 0 8px rgba(11, 143, 71, 0.1); }

    .btn-submit {
        width: 100%;
        padding: 14px;
        background: var(--verde-firme);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn-submit:hover { filter: brightness(1.1); transform: translateY(-2px); }

    .message { padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; font-size: 0.85rem; text-align: center; font-weight: bold; }
    .message-success { background: #d1fae5; color: #065f46; }
    .message-error { background: #fee2e2; color: #991b1b; }

    @media(max-width: 850px){
        .container { flex-direction: column; height: auto; min-height: auto; }
        .left-side, .right-side { width: 100%; }
        .form-grid { grid-template-columns: 1fr; }
        .tabs-wrapper { max-height: none; overflow: visible; } /* No mobile, cresce livremente */
    }
</style>
</head>
<body>

<div class="container">
    <div class="left-side">
        <img src="Logo.png" class="logo-img">
        <p>Plataforma inteligente para monitoramento agrícola e controle completo da sua fazenda.</p>
    </div>

    <div class="right-side">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">LOGIN</button>
            <button class="tab" onclick="switchTab('register')">CADASTRO</button>
        </div>

        <div class="tabs-wrapper">
            <div class="tab-content active" id="loginTab">
                <h2 class="form-title">Entrar</h2>
                <p class="form-subtitle">Acesse sua conta para continuar.</p>
                <div class="message" id="loginMessage"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="Digite seu email" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="loginPassword" placeholder="Digite sua senha" required>
                    </div>
                    <button type="submit" class="btn-submit">Entrar no Sistema</button>
                </form>
            </div>

            <div class="tab-content" id="registerTab">
                <h2 class="form-title">Criar Conta</h2>
                <p class="form-subtitle">Gerencie sua fazenda agora mesmo.</p>
                <div class="message" id="registerMessage"></div>
                <form id="registerForm" class="form-grid">
                    <div class="form-group full-width">
                        <label>Nome Completo</label>
                        <input type="text" id="regName" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" id="regPhone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="regPassword" placeholder="Mín. 6 chars" required>
                    </div>
                    <div class="form-group">
                        <label>Confirmar</label>
                        <input type="password" id="regConfirmPassword" placeholder="Repita a senha" required>
                    </div>
                    <div class="form-group full-width">
                        <button type="submit" class="btn-submit">Criar Minha Conta</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(tab){
        document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        if(tab === 'login'){
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('loginTab').classList.add('active');
        }else{
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('registerTab').classList.add('active');
        }
    }

    let DB = {
        users: JSON.parse(localStorage.getItem('agroecho_all_users')) || [
            { id:1, name:'Admin', email:'admin@agroecho.com.br', password:'admin123', role:'admin' }
        ]
    };

    function saveDB(){ localStorage.setItem('agroecho_all_users', JSON.stringify(DB.users)); }

    document.getElementById('loginForm').addEventListener('submit', function(e){
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const msg = document.getElementById('loginMessage');
        const user = DB.users.find(u => u.email === email && u.password === password);

        if(user){
            sessionStorage.setItem('agroecho_user', JSON.stringify(user));
            msg.className = 'message message-success';
            msg.style.display = 'block';
            msg.innerHTML = 'Sucesso! Entrando...';
            setTimeout(() => { window.location.href = user.role === 'admin' ? 'dashboard.html' : 'USER_DISPOSITIVOS.html'; }, 1000);
        } else {
            msg.className = 'message message-error';
            msg.style.display = 'block';
            msg.innerHTML = 'Dados incorretos.';
        }
    });

    document.getElementById('registerForm').addEventListener('submit', function(e){
        e.preventDefault();
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        const msg = document.getElementById('registerMessage');

        if(password !== confirm){
            msg.className = 'message message-error'; msg.style.display = 'block';
            msg.innerHTML = 'Senhas diferentes!'; return;
        }

        if(DB.users.some(u => u.email === email)){
            msg.className = 'message message-error'; msg.style.display = 'block';
            msg.innerHTML = 'Email já existe.'; return;
        }

        DB.users.push({ id: Date.now(), name, email, password, role:'user' });
        saveDB();
        msg.className = 'message message-success'; msg.style.display = 'block';
        msg.innerHTML = 'Conta criada!';
        setTimeout(() => switchTab('login'), 1500);
    });
</script>

</body>
</html>
